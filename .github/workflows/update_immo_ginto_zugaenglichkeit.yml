name: Update immo_ginto_zugaenglichkeit

on:
  schedule:
    - cron:  '18 18 * * 5' # Friday 18:18
  workflow_dispatch:
  push:
    branches:
      - setup_ginto


jobs:
  update_data_py:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: integration

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      
    - name: "Set up Python"
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install requirements
      run: uv pip install -r automation/automation-requirements.txt
      env:
        UV_SYSTEM_PYTHON: 1
        
    - name: Prepare data
      env:
        GINTO_API_TOKEN: ${{ secrets.GINTO_API_TOKEN }}
      run: python automation/immo_ginto_zugaenglichkeit/ginto_api.py

    - name: Upload file to CKAN
      env:
        CKAN_BASE_URL: ${{ secrets.CKAN_BASE_URL }}
        CKAN_API_KEY: ${{ secrets.CKAN_API_KEY }}
        SSL_VERIFY: ${{ secrets.SSL_VERIFY }}
      run: |
        python automation/upload_resource_to_ckan_with_patch.py -f automation/immo_ginto_zugaenglichkeit/immo_ginto_zugaenglichkeit.csv -d immo_ginto_zugaenglichkeit

    - name: Update CKAN metadata
      env:
        CKAN_BASE_URL: ${{ secrets.CKAN_BASE_URL }}
        CKAN_API_KEY: ${{ secrets.CKAN_API_KEY }}
        SSL_VERIFY: ${{ secrets.SSL_VERIFY }}
      run: |
        python automation/xls_to_meta_xml.py -f automation/immo_ginto_zugaenglichkeit/Meta_IMMO_Ginto.xlsx --outfile automation/immo_ginto_zugaenglichkeit/meta.xml --tag github
        python automation/update_metadata.py -d immo_ginto_zugaenglichkeit -f automation/immo_ginto_zugaenglichkeit/meta.xml

    - name: Notify telegram failure
      if: ${{ failure()  || cancelled() }}
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        format: markdown
        message: |
          🔴 [Update immo_ginto_zugaenglichkeit Failed](https://github.com/opendatazurich/opendatazurich.github.io/actions/runs/${{ github.run_id }}?check_suite_focus=true)
