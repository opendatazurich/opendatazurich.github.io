name: Update WVZ Brunnenbilder

on:
  schedule:
    - cron:  '5 20 * * 5' # At 20:05 on Friday
  workflow_dispatch:
  push:
    branches:
      - brunnenbilder



jobs:
  update_data_py:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: integration

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      
    - name: "Set up Python"
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install requirements
      run: uv pip install -r automation/automation-requirements.txt
      env:
        UV_SYSTEM_PYTHON: 1
        
    - name: Prepare data
      run: python automation/wvz_brunnenbilder/brunnen_image_scraper.py

    - name: Upload file to CKAN
      env:
        CKAN_BASE_URL: ${{ secrets.CKAN_BASE_URL }}
        CKAN_API_KEY: ${{ secrets.CKAN_API_KEY }}
        SSL_VERIFY: ${{ secrets.SSL_VERIFY }}
      run: |
        python automation/upload_resource_to_ckan_with_patch.py -f automation/wvz_brunnenbilder/brunnen_webseite_url.csv -d dib_wvz_brunnenbilder

    - name: Update CKAN metadata
      env:
        CKAN_BASE_URL: ${{ secrets.CKAN_BASE_URL }}
        CKAN_API_KEY: ${{ secrets.CKAN_API_KEY }}
        SSL_VERIFY: ${{ secrets.SSL_VERIFY }}
      run: |
        python automation/xls_to_meta_xml.py -f automation/wvz_brunnenbilder/meta_wvz_brunnenbilder.xlsx --outfile automation/wvz_brunnenbilder/meta.xml --tag github
        python automation/update_metadata.py -d dib_wvz_brunnenbilder -f automation/wvz_brunnenbilder/meta.xml

    - name: Notify telegram failure
      if: ${{ failure()  || cancelled() }}
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        format: markdown
        message: |
          🔴 [Update WVZ Brunnenbilder Failed](https://github.com/opendatazurich/opendatazurich.github.io/actions/runs/${{ github.run_id }}?check_suite_focus=true)
